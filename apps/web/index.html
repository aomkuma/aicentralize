<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Kora — AI-Powered Meeting & Work OS. Turn meetings, documents, and knowledge into trackable actions." />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kora" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <script>
      (function () {
        var storageKey = 'theme-preference'
        var stored = localStorage.getItem(storageKey)
        var preference = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system'
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var resolvedDark = preference === 'dark' || (preference === 'system' && systemDark)

        document.documentElement.classList.toggle('dark', resolvedDark)
        document.documentElement.style.colorScheme = resolvedDark ? 'dark' : 'light'
      })()
    </script>
    
    <title>Kora — AI-Powered Meeting & Work OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
